name: Update MS Data

on:
  schedule:
    - cron: '0 11 * * 5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'weekly or monthly'
        required: false
        default: 'weekly'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4 curl_cffi

      - name: Run update script
        run: |
          MODE="${{ github.event.inputs.mode || 'weekly' }}"
          echo "mode: $MODE"
          python tools/update.py --mode "$MODE"

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet data/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ms_data.json data/ms_url_list.json data/custom_parts.json data/enhancement_skills.json
          git commit -m "chore: update MS data ($(date +'%Y-%m-%d'))"
          git push
